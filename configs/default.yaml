# RAG Pipeline Configuration

retrieval:
  top_k: 10
  bm25_weight: 0.3
  dense_weight: 0.7
  min_score: 0.3

rerank:
  top_k: 5
  model: "BAAI/bge-reranker-base"
  batch_size: 32

selfcheck:
  threshold: 0.7
  model: "bge-reranker"  # Same model used for self-check
  max_retries: 2

generation:
  temperature: 0.1
  max_tokens: 2048
  timeout: 60

ocr:
  use_angle_cls: true
  lang: "ch"
  use_gpu: false
  table_format: "markdown"

chunking:
  max_chunk_size: 512
  overlap_size: 50
  table_as_chunk: true

pdf:
  classify_enabled: true
  force_ocr_for_scanned: true

logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
